name: Deploy Firebase Backend

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'database.rules.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy Firebase backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Build Functions
        run: npm --prefix functions run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AFETNET_4A6B6 }}'

      - name: Deploy Functions and rules
        run: >
          npx firebase-tools@latest deploy
          --project afetnet-4a6b6
          --only functions,firestore:rules,firestore:indexes,storage,database
          --non-interactive

      - name: Deployment summary
        if: always()
        run: |
          echo "## Firebase Backend Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** ${{ github.ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
